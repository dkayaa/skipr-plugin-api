# MySQL only. Merge with docker-compose.yml for the full stack.
#
# DB only (published on localhost via docker-compose.db.dev.yml):
#   docker compose -f docker-compose.db.yml -f docker-compose.db.dev.yml up -d --wait
#
# Production / full stack:
#   docker compose -f docker-compose.db.yml -f docker-compose.yml [-f docker-compose.prod.yml] up -d --build

services:
  db:
    image: mysql:8.0
    container_name: skipr-db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
