# Local dev overlay: publish app on localhost.
#
# Full stack in Docker:
#   docker compose -f docker-compose.db.yml -f docker-compose.db.dev.yml -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# DB only:
#   docker compose -f docker-compose.db.yml -f docker-compose.db.dev.yml up -d --wait

services:
  app:
    ports:
      - "127.0.0.1:8090:8090"
