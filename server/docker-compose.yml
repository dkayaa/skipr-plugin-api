# App service only. Always merge with docker-compose.db.yml.
#
# Local dev (app in Docker):
#   docker compose -f docker-compose.db.yml -f docker-compose.db.dev.yml -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Production:
#   docker compose -f docker-compose.db.yml -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    container_name: skipr-app
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
